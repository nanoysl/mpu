<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU | LineWaves Hero</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --nav-height: 80px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100vh;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        /* =========================================
           1. INTRO: DER FÜHRERSCHEIN
           ========================================= */
        #intro-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            perspective: 1500px;
            pointer-events: none;
        }

        /* Ein nachgebauter EU-Führerschein mit CSS */
        .license-card {
            width: 400px;
            height: 250px;
            background: linear-gradient(135deg, #e6c5d1 0%, #d8e0e8 100%);
            border-radius: 12px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.5);
            padding: 20px;
            position: relative;
            transform-style: preserve-3d;
            opacity: 0; /* Wird von GSAP gesteuert */
        }

        .license-photo {
            position: absolute;
            top: 40px;
            left: 20px;
            width: 80px;
            height: 100px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .license-lines {
            position: absolute;
            top: 40px;
            left: 120px;
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .l-line {
            height: 8px;
            background: rgba(0,0,0,0.15);
            border-radius: 4px;
        }
        .l-line:nth-child(1) { width: 100%; }
        .l-line:nth-child(2) { width: 80%; }
        .l-line:nth-child(3) { width: 60%; }
        .l-line:nth-child(4) { width: 90%; }
        .l-line:nth-child(5) { width: 40%; margin-top: 20px;}

        .license-eu {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 40px;
            height: 25px;
            background: #003399;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffcc00;
            font-size: 10px;
            font-weight: bold;
        }

        /* =========================================
           2. HERO SECTION (LineWaves + UI)
           ========================================= */
        #hero-container {
            position: fixed;
            inset: 0;
            z-index: 10;
            opacity: 0; /* Wird nach Intro eingeblendet */
            display: flex;
            flex-direction: column;
        }

        /* Der Container für den ReactBits OGL Code */
        #line-waves-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        /* UI OVERLAY */
        .ui-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4vw;
            height: var(--nav-height);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }

        .nav-cta {
            padding: 0.8rem 1.8rem;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: transform 0.3s ease;
        }

        .nav-cta:hover { transform: scale(1.05); }

        /* Main Content */
        .hero-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 2rem;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .headline {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            max-width: 900px;
        }

        .subtext {
            font-size: clamp(1rem, 1.2vw, 1.2rem);
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        .btn-primary {
            padding: 1.2rem 3.5rem;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            font-size: 1rem;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .btn-primary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <div class="license-card" id="license">
            <div class="license-eu">D</div>
            <div class="license-photo"></div>
            <div class="license-lines">
                <div class="l-line"></div>
                <div class="l-line"></div>
                <div class="l-line"></div>
                <div class="l-line"></div>
                <div class="l-line"></div>
            </div>
        </div>
    </div>

    <div id="hero-container">
        <div id="line-waves-bg"></div>
        
        <div class="ui-layer">
            <nav class="navbar">
                <div class="nav-logo">MPU Experten</div>
                <a href="#" class="nav-cta">Erstgespräch anfragen</a>
            </nav>

            <div class="hero-content">
                <div class="badge">Der Fahrplan zurück zur Mobilität</div>
                <h1 class="headline">Reiten Sie die Welle<br>zurück zum Führerschein.</h1>
                <p class="subtext">
                    Keine unseriösen Versprechen, sondern klare Struktur. Wir begleiten Sie diskret und wissenschaftlich fundiert durch den gesamten Prozess Ihrer MPU.
                </p>
                <a href="#" class="btn-primary">Jetzt starten</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { Renderer, Program, Mesh, Triangle } from 'https://cdn.jsdelivr.net/npm/ogl@1.0.11/+esm';

        /* =========================================================
           1. EXACT SHADERS FROM REACTBITS
           ========================================================= */
        const vertexShader = `
            attribute vec2 uv;
            attribute vec2 position;
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 0, 1);
            }
        `;

        const fragmentShader = `
            precision highp float;

            uniform float uTime;
            uniform vec3 uResolution;
            uniform float uSpeed;
            uniform float uInnerLines;
            uniform float uOuterLines;
            uniform float uWarpIntensity;
            uniform float uRotation;
            uniform float uEdgeFadeWidth;
            uniform float uColorCycleSpeed;
            uniform float uBrightness;
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            uniform vec3 uColor3;
            uniform vec2 uMouse;
            uniform float uMouseInfluence;
            uniform bool uEnableMouse;

            #define HALF_PI 1.5707963

            float hashF(float n) {
                return fract(sin(n * 127.1) * 43758.5453123);
            }

            float smoothNoise(float x) {
                float i = floor(x);
                float f = fract(x);
                float u = f * f * (3.0 - 2.0 * f);
                return mix(hashF(i), hashF(i + 1.0), u);
            }

            float displaceA(float coord, float t) {
                float result = sin(coord * 2.123) * 0.2;
                result += sin(coord * 3.234 + t * 4.345) * 0.1;
                result += sin(coord * 0.589 + t * 0.934) * 0.5;
                return result;
            }

            float displaceB(float coord, float t) {
                float result = sin(coord * 1.345) * 0.3;
                result += sin(coord * 2.734 + t * 3.345) * 0.2;
                result += sin(coord * 0.189 + t * 0.934) * 0.3;
                return result;
            }

            vec2 rotate2D(vec2 p, float angle) {
                float c = cos(angle);
                float s = sin(angle);
                return vec2(p.x * c - p.y * s, p.x * s + p.y * c);
            }

            void main() {
                vec2 coords = gl_FragCoord.xy / uResolution.xy;
                coords = coords * 2.0 - 1.0;
                coords = rotate2D(coords, uRotation);

                float halfT = uTime * uSpeed * 0.5;
                float fullT = uTime * uSpeed;

                float mouseWarp = 0.0;
                if (uEnableMouse) {
                    vec2 mPos = rotate2D(uMouse * 2.0 - 1.0, uRotation);
                    float mDist = length(coords - mPos);
                    mouseWarp = uMouseInfluence * exp(-mDist * mDist * 4.0);
                }

                float warpAx = coords.x + displaceA(coords.y, halfT) * uWarpIntensity + mouseWarp;
                float warpAy = coords.y - displaceA(coords.x * cos(fullT) * 1.235, halfT) * uWarpIntensity;
                float warpBx = coords.x + displaceB(coords.y, halfT) * uWarpIntensity + mouseWarp;
                float warpBy = coords.y - displaceB(coords.x * sin(fullT) * 1.235, halfT) * uWarpIntensity;

                vec2 fieldA = vec2(warpAx, warpAy);
                vec2 fieldB = vec2(warpBx, warpBy);
                vec2 blended = mix(fieldA, fieldB, mix(fieldA, fieldB, 0.5));

                float fadeTop = smoothstep(uEdgeFadeWidth, uEdgeFadeWidth + 0.4, blended.y);
                float fadeBottom = smoothstep(-uEdgeFadeWidth, -(uEdgeFadeWidth + 0.4), blended.y);
                float vMask = 1.0 - max(fadeTop, fadeBottom);

                float tileCount = mix(uOuterLines, uInnerLines, vMask);
                float scaledY = blended.y * tileCount;
                float nY = smoothNoise(abs(scaledY));

                float ridge = pow(
                    step(abs(nY - blended.x) * 2.0, HALF_PI) * cos(2.0 * (nY - blended.x)),
                    5.0
                );

                float lines = 0.0;
                for (float i = 1.0; i < 3.0; i += 1.0) {
                    lines += pow(max(fract(scaledY), fract(-scaledY)), i * 2.0);
                }

                float pattern = vMask * lines;

                float cycleT = fullT * uColorCycleSpeed;
                float rChannel = (pattern + lines * ridge) * (cos(blended.y + cycleT * 0.234) * 0.5 + 1.0);
                float gChannel = (pattern + vMask * ridge) * (sin(blended.x + cycleT * 1.745) * 0.5 + 1.0);
                float bChannel = (pattern + lines * ridge) * (cos(blended.x + cycleT * 0.534) * 0.5 + 1.0);

                vec3 col = (rChannel * uColor1 + gChannel * uColor2 + bChannel * uColor3) * uBrightness;
                float alpha = clamp(length(col), 0.0, 1.0);

                gl_FragColor = vec4(col, alpha);
            }
        `;

        /* =========================================================
           2. VANILLA OGL SETUP (Exakte Portierung der ReactBits Props)
           ========================================================= */
        function hexToVec3(hex) {
            const h = hex.replace('#', '');
            return [
                parseInt(h.slice(0, 2), 16) / 255,
                parseInt(h.slice(2, 4), 16) / 255,
                parseInt(h.slice(4, 6), 16) / 255
            ];
        }

        // Exakte Parameter aus deinem Prompt
        const config = {
            speed: 0.3,
            innerLineCount: 32,
            outerLineCount: 36,
            warpIntensity: 1,
            rotation: -45,
            edgeFadeWidth: 0,
            colorCycleSpeed: 1,
            brightness: 0.2,
            color1: "#ffffff",
            color2: "#ffffff",
            color3: "#ffffff",
            enableMouseInteraction: true,
            mouseInfluence: 2
        };

        const container = document.getElementById('line-waves-bg');
        const renderer = new Renderer({ alpha: true, premultipliedAlpha: false });
        const gl = renderer.gl;
        gl.clearColor(0, 0, 0, 0);
        container.appendChild(gl.canvas);

        let currentMouse = [0.5, 0.5];
        let targetMouse = [0.5, 0.5];

        function handleMouseMove(e) {
            const rect = gl.canvas.getBoundingClientRect();
            targetMouse = [
                (e.clientX - rect.left) / rect.width,
                1.0 - (e.clientY - rect.top) / rect.height
            ];
        }

        function handleMouseLeave() {
            targetMouse = [0.5, 0.5];
        }

        function resize() {
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            if (program) {
                program.uniforms.uResolution.value = [gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height];
            }
        }
        window.addEventListener('resize', resize);

        const geometry = new Triangle(gl);
        const rotationRad = (config.rotation * Math.PI) / 180;
        
        let program = new Program(gl, {
            vertex: vertexShader,
            fragment: fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uResolution: { value: [gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height] },
                uSpeed: { value: config.speed },
                uInnerLines: { value: config.innerLineCount },
                uOuterLines: { value: config.outerLineCount },
                uWarpIntensity: { value: config.warpIntensity },
                uRotation: { value: rotationRad },
                uEdgeFadeWidth: { value: config.edgeFadeWidth },
                uColorCycleSpeed: { value: config.colorCycleSpeed },
                uBrightness: { value: config.brightness },
                uColor1: { value: hexToVec3(config.color1) },
                uColor2: { value: hexToVec3(config.color2) },
                uColor3: { value: hexToVec3(config.color3) },
                uMouse: { value: new Float32Array([0.5, 0.5]) },
                uMouseInfluence: { value: config.mouseInfluence },
                uEnableMouse: { value: config.enableMouseInteraction }
            }
        });

        const mesh = new Mesh(gl, { geometry, program });
        resize();

        if (config.enableMouseInteraction) {
            gl.canvas.addEventListener('mousemove', handleMouseMove);
            gl.canvas.addEventListener('mouseleave', handleMouseLeave);
        }

        function update(time) {
            requestAnimationFrame(update);
            program.uniforms.uTime.value = time * 0.001;

            if (config.enableMouseInteraction) {
                currentMouse[0] += 0.05 * (targetMouse[0] - currentMouse[0]);
                currentMouse[1] += 0.05 * (targetMouse[1] - currentMouse[1]);
                program.uniforms.uMouse.value[0] = currentMouse[0];
                program.uniforms.uMouse.value[1] = currentMouse[1];
            }

            renderer.render({ scene: mesh });
        }
        requestAnimationFrame(update);

        /* =========================================================
           3. GSAP ANIMATION SEQUENCE (Führerschein -> Hero)
           ========================================================= */
        window.addEventListener('load', () => {
            const tl = gsap.timeline();

            // 1. Der Führerschein fliegt aus der Tiefe ins Bild
            tl.fromTo("#license", 
                { z: -2000, rotationY: 720, rotationZ: -45, opacity: 0 },
                { z: 0, rotationY: 0, rotationZ: 0, opacity: 1, duration: 1.5, ease: "power3.out" }
            )
            
            // 2. Er bleibt kurz stehen
            .to("#license", { duration: 0.5 }) 

            // 3. Er rotiert wild im Hintergrund, verschwimmt massiv und verschwindet
            .to("#license", { 
                scale: 4, 
                rotationY: 360, 
                filter: "blur(40px)", 
                opacity: 0, 
                duration: 1.2, 
                ease: "power2.in" 
            })

            // 4. Nahtloser Übergang: Die Hero Section (LineWaves + UI) blendet sich ein
            .to("#hero-container", { opacity: 1, duration: 1.5, ease: "power2.out" }, "-=0.5")
            
            // 5. Entferne das Intro-DOM nach der Animation
            .add(() => { document.getElementById('intro-container').remove(); });
        });
    </script>
</body>
</html>
