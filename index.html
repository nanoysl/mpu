<!DOCTYPE html>
<html lang="de" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPU Vorbereitung | Premium Ersteinschätzung</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000',
                        obsidian: '#09090b',
                        sand: '#E5E1D8',
                        gold: '#D4AF37',
                        accent: '#0D9488', // Seriöses Petrol
                    },
                    fontFamily: {
                        sans: ['Manrope', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        wide: ['Syncopate', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        /* Pure Performance Resets */
        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            background-color: #000000;
            color: #E5E1D8;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Lock scroll, this is a cinematic hero */
            -webkit-font-smoothing: antialiased;
        }

        /* Hardware Acceleration Classes 
           forces browser to use GPU, preventing lag 
        */
        .gpu-accel {
            will-change: transform, opacity, clip-path;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Custom Selection */
        ::selection { background: #0D9488; color: #fff; }

        /* The Cinematic Clip Mask */
        .reveal-mask {
            clip-path: inset(0 100% 0 0);
        }

        /* Minimalist Scrollbar if ever needed */
        ::-webkit-scrollbar { display: none; }
        
        /* Perspective Container */
        .scene-container {
            perspective: 2000px;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>

    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState, useLayoutEffect } = React;

        // --- COMPONENTS ---

        // 1. The Kinetic Pillar (Fahrplan-Schritte im 3D-Raum)
        const KineticPillar = ({ num, title, desc, index }) => {
            const pillarRef = useRef(null);
            const contentRef = useRef(null);

            const handleEnter = () => {
                gsap.to(pillarRef.current, { 
                    y: -10, 
                    backgroundColor: 'rgba(255, 255, 255, 0.05)',
                    borderColor: 'rgba(13, 148, 136, 0.5)', // accent
                    duration: 0.4, 
                    ease: "power3.out" 
                });
                gsap.to(contentRef.current, {
                    opacity: 1, y: 0, duration: 0.4, ease: "power2.out"
                });
            };

            const handleLeave = () => {
                gsap.to(pillarRef.current, { 
                    y: 0, 
                    backgroundColor: 'rgba(255, 255, 255, 0)',
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    duration: 0.6, 
                    ease: "power3.out" 
                });
                gsap.to(contentRef.current, {
                    opacity: 0.3, y: 5, duration: 0.4, ease: "power2.in"
                });
            };

            return (
                <div 
                    ref={pillarRef}
                    onMouseEnter={handleEnter}
                    onMouseLeave={handleLeave}
                    className="pillar-item gpu-accel relative flex flex-col justify-between p-6 border-l border-white/10 h-full min-h-[250px] cursor-pointer group transition-colors"
                >
                    <div className="font-wide text-3xl md:text-5xl font-bold text-white/20 group-hover:text-accent transition-colors duration-500">
                        {num}
                    </div>
                    
                    <div ref={contentRef} className="opacity-30 translate-y-1">
                        <h3 className="font-serif text-xl text-white mb-2">{title}</h3>
                        <p className="font-sans text-xs text-sand/60 leading-relaxed">
                            {desc}
                        </p>
                    </div>
                </div>
            );
        };

        // 2. Pure Performance Magnetic CTA
        const MagneticCTA = ({ text, primary = true }) => {
            const btnRef = useRef(null);
            const textRef = useRef(null);

            useEffect(() => {
                const btn = btnRef.current;
                if (!btn) return;

                const moveMouse = (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
                    const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
                    
                    gsap.to(btn, { x, y, duration: 0.6, ease: "power3.out" });
                    gsap.to(textRef.current, { x: x*0.5, y: y*0.5, duration: 0.6, ease: "power3.out" });
                };

                const leaveMouse = () => {
                    gsap.to(btn, { x: 0, y: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
                    gsap.to(textRef.current, { x: 0, y: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
                };

                btn.addEventListener('mousemove', moveMouse);
                btn.addEventListener('mouseleave', leaveMouse);

                return () => {
                    btn.removeEventListener('mousemove', moveMouse);
                    btn.removeEventListener('mouseleave', leaveMouse);
                };
            }, []);

            return (
                <button 
                    ref={btnRef}
                    className={`gpu-accel relative group flex items-center justify-center px-10 py-5 rounded-full font-sans font-semibold tracking-wider text-sm uppercase overflow-hidden
                        ${primary ? 'bg-accent text-void' : 'bg-transparent border border-white/20 text-sand hover:border-white/50'}
                    `}
                >
                    {primary && <div className="absolute inset-0 bg-white translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-in-out"></div>}
                    <span ref={textRef} className="relative z-10 block mix-blend-difference text-white flex items-center gap-2">
                        {text}
                        {primary && (
                            <svg className="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                        )}
                    </span>
                </button>
            );
        };

        // 3. Main Masterpiece Scene
        const MpuHero = () => {
            const sceneRef = useRef(null);
            
            // GSAP Master Timeline
            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    const tl = gsap.timeline();

                    // Initial set states for 3D architecture
                    gsap.set(".headline-word", { y: "100%", opacity: 0, rotateX: -90 });
                    gsap.set(".divider-line", { scaleX: 0, transformOrigin: "left" });
                    gsap.set(".trust-badge", { opacity: 0, x: -20 });
                    gsap.set(".pillar-item", { opacity: 0, y: 50, rotateY: 15 });
                    gsap.set(".action-area", { opacity: 0, y: 20 });
                    gsap.set(".intro-overlay", { scaleY: 1, transformOrigin: "bottom" });

                    // 1. The Monolith Opens (Extremely fast, cinematic reveal)
                    tl.to(".intro-overlay", {
                        scaleY: 0,
                        duration: 1.2,
                        ease: "expo.inOut"
                    }, 0.2);

                    // 2. Kinetic Typography Entry (3D rotation)
                    tl.to(".headline-word", {
                        y: "0%",
                        opacity: 1,
                        rotateX: 0,
                        duration: 1.2,
                        stagger: 0.1,
                        ease: "power4.out"
                    }, 0.8);

                    // 3. Trust Badges & Divider shoot across
                    tl.to(".divider-line", {
                        scaleX: 1,
                        duration: 1.5,
                        ease: "expo.out"
                    }, 1.2);

                    tl.to(".trust-badge", {
                        opacity: 1,
                        x: 0,
                        duration: 0.8,
                        stagger: 0.1,
                        ease: "power3.out"
                    }, 1.4);

                    // 4. The Architecture (Pillars) slide into 3D space
                    tl.to(".pillar-item", {
                        opacity: 1,
                        y: 0,
                        rotateY: 0,
                        duration: 1.2,
                        stagger: 0.15,
                        ease: "expo.out"
                    }, 1.6);

                    // 5. Action Area Fades in
                    tl.to(".action-area", {
                        opacity: 1,
                        y: 0,
                        duration: 1,
                        ease: "power3.out"
                    }, 2.2);

                }, sceneRef);

                return () => ctx.revert();
            }, []);

            const steps = [
                { num: "01", title: "Akte & Fall", desc: "Tiefenanalyse der Behördenakte. Wir entschlüsseln Vorwürfe und Fristen ohne Umwege." },
                { num: "02", title: "Nachweise", desc: "Strategische Klärung: Sind Abstinenznachweise zwingend? Wir verhindern verlorene Monate." },
                { num: "03", title: "Aufarbeitung", desc: "Kein Auswendiglernen. Echte, psychologisch fundierte Reflexion Ihres Falls." },
                { num: "04", title: "Simulation", desc: "Wir simulieren das Gutachtergespräch unter Realbedingungen, bis die Unsicherheit weicht." }
            ];

            return (
                <div ref={sceneRef} className="scene-container w-full h-full relative flex flex-col justify-between p-6 lg:p-12 overflow-hidden">
                    
                    <div className="intro-overlay fixed inset-0 bg-obsidian z-50 pointer-events-none flex items-center justify-center">
                        <div className="font-wide text-xs tracking-[0.5em] text-white/30 animate-pulse">SYSTEM INITIALIZING</div>
                    </div>

                    {/* Top Navigation / Branding */}
                    <header className="relative z-20 flex justify-between items-start w-full">
                        <div className="trust-badge flex flex-col">
                            <span className="font-wide font-bold tracking-widest text-lg uppercase flex items-center gap-3 text-white">
                                <span className="w-1.5 h-1.5 bg-accent rounded-full"></span>
                                MPU Kompetenz
                            </span>
                            <span className="font-sans text-[10px] text-sand/50 uppercase tracking-[0.2em] mt-2">
                                [Stadt] & Online Coaching
                            </span>
                        </div>

                        <div className="hidden lg:flex gap-4">
                            {["Diskrete Erstberatung", "Alkohol, Drogen, Punkte", "Ohne Auswendiglernen"].map((text, i) => (
                                <div key={i} className="trust-badge font-sans text-[10px] uppercase tracking-widest px-4 py-2 border border-white/10 rounded-full text-sand/70">
                                    {text}
                                </div>
                            ))}
                        </div>
                    </header>

                    {/* Main Cinematic Core */}
                    <main className="relative z-10 w-full flex flex-col justify-center flex-grow mt-12 lg:mt-0">
                        
                        {/* Massive Typography Section */}
                        <div className="flex flex-col w-full max-w-7xl mx-auto">
                            <h1 className="font-wide text-[10vw] lg:text-[7vw] leading-[0.85] font-bold uppercase text-white tracking-tighter mix-blend-difference perspective-1000">
                                <div className="overflow-hidden"><div className="headline-word gpu-accel">ZURÜCK</div></div>
                                <div className="overflow-hidden flex items-center gap-4">
                                    <div className="headline-word gpu-accel text-accent">IN DIE</div>
                                    <div className="headline-word gpu-accel italic font-serif font-light text-sand lowercase translate-y-[-10%]">Spur.</div>
                                </div>
                            </h1>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-8 lg:mt-12 items-end">
                                <div className="lg:col-span-5 overflow-hidden">
                                    <p className="headline-word font-sans text-base lg:text-lg font-light text-sand/80 leading-relaxed">
                                        Wir ordnen das Chaos. Strukturierte, persönliche Vorbereitung in [Stadt]. <strong className="text-white font-medium">Keine Garantieversprechen. Nur glasklare Fakten, Diskretion und ein sicherer Weg zum Gutachter.</strong>
                                    </p>
                                </div>
                                
                                {/* Dynamic Divider */}
                                <div className="lg:col-span-7 h-px bg-white/20 divider-line hidden lg:block mb-4"></div>
                            </div>
                        </div>

                        {/* 3D Kinetic Pillars (The Roadmap) */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 w-full max-w-7xl mx-auto mt-12 lg:mt-16 h-auto lg:h-[30vh]">
                            {steps.map((step, i) => (
                                <KineticPillar key={i} index={i} num={step.num} title={step.title} desc={step.desc} />
                            ))}
                        </div>

                    </main>

                    {/* Bottom Action Area */}
                    <footer className="action-area relative z-20 w-full max-w-7xl mx-auto mt-8 flex flex-col md:flex-row justify-between items-center gap-6 border-t border-white/10 pt-8">
                        
                        <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                            <MagneticCTA text="Ersteinschätzung anfragen" primary={true} />
                            <MagneticCTA text="0123 / 456 789 0" primary={false} />
                        </div>

                        <div className="flex items-center gap-3 opacity-40">
                            <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span className="font-sans text-[10px] uppercase tracking-widest text-white">Seriöse Vorbereitung statt falscher Versprechen.</span>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MpuHero />);
    </script>
</body>
</html>
