<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU | Die Architektur der Klarheit</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030304;
            --text-color: #F5F5F0;
            --accent: #C4A77D; /* Premium Gold/Bronze */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar { display: none; }

        /* Das WebGL Canvas im Hintergrund */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Die physische Scroll-Fläche */
        .scroll-track {
            position: relative;
            height: 350vh; /* Genug Raum für die dramatische Transformation */
            z-index: 2;
        }

        /* Instruktion am Anfang */
        .instruction {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(245, 245, 240, 0.3);
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Das UI-Layer, das am Ende der Formation erscheint */
        .ui-layer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 12vh;
            z-index: 20;
            pointer-events: none;
        }

        .ui-content {
            text-align: center;
            max-width: 600px;
            opacity: 0; /* GSAP übernimmt das Reveal */
            transform: translateY(20px);
        }

        .subheadline {
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 300;
            color: rgba(245, 245, 240, 0.7);
            margin-bottom: 2.5rem;
        }

        .cta-btn {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background-color: var(--text-color);
            color: var(--bg-color);
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
            border-radius: 100px;
            pointer-events: auto;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background-color: var(--accent);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <div class="instruction" id="scroll-hint">Scroll down to process</div>
    <canvas id="webgl-canvas"></canvas>

    <div class="scroll-track"></div>

    <div class="ui-layer">
        <div class="ui-content" id="final-ui">
            <p class="subheadline">
                Der Weg durch die MPU ist kein Glücksspiel, sondern ein System. Wir nehmen Ihnen die Last des Chaos und ersetzen sie durch eine Strategie, die jedem Gutachter standhält.
            </p>
            <a href="#" class="cta-btn">Strategiegespräch anfragen</a>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        uniform float u_progress;
        uniform float u_time;
        
        attribute vec3 a_randomPos;
        attribute float a_size;
        
        varying float v_alpha;

        void main() {
            // Die Partikel driften leicht im Chaos-Zustand
            vec3 driftingChaos = a_randomPos + vec3(
                sin(u_time * 0.5 + a_randomPos.y) * 10.0,
                cos(u_time * 0.4 + a_randomPos.x) * 10.0,
                sin(u_time * 0.6 + a_randomPos.z) * 10.0
            );

            // Eine extrem hochwertige Easing-Kurve (Cubic InOut) für den Morph-Prozess
            float ease = u_progress < 0.5 ? 4.0 * u_progress * u_progress * u_progress : 1.0 - pow(-2.0 * u_progress + 2.0, 3.0) / 2.0;

            // Mischen zwischen Chaos und Struktur (Dem Zielwort)
            vec3 finalPos = mix(driftingChaos, position, ease);

            vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
            
            // Wenn strukturiert, sind die Partikel winzig und scharf. Im Chaos groß und weich.
            float currentSize = mix(a_size * 3.0, a_size * 0.8, ease);
            
            gl_PointSize = currentSize * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;

            // Tiefenschärfe/Fading simulieren
            v_alpha = mix(0.4, 0.9, ease) * (1.0 - (mvPosition.z / -1000.0));
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        varying float v_alpha;

        void main() {
            // Zeichne einen perfekten, weichen Kreis
            vec2 xy = gl_PointCoord.xy - vec2(0.5);
            float ll = length(xy);
            if (ll > 0.5) discard;
            
            // Ein edles Gold/Beige
            vec3 color = vec3(0.85, 0.78, 0.68);
            
            // Sanfter Glow-Edge
            float alpha = (0.5 - ll) * 2.0 * v_alpha;
            
            gl_FragColor = vec4(color, alpha);
        }
    </script>

    <script>
        /**
         * 1. LENIS SMOOTH SCROLL
         */
        const lenis = new Lenis({
            duration: 1.8, // Schwer, elegant, kontrolliert
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0, 0);

        /**
         * 2. PIXEL SAMPLING (Das Herzstück)
         * Wir generieren ein Canvas, schreiben unseren Text und holen uns die genauen Pixelkoordinaten,
         * um sie den 3D Partikeln als Ziel zuzuweisen.
         */
        function getTextCoordinates() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200;
            canvas.height = 400;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '900 160px Inter'; // Brutale, dicke Schrift
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('KLARHEIT.', canvas.width / 2, canvas.height / 2);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const coordinates = [];

            // Wir scannen das Bild. Nicht jeden Pixel (zu viele), sondern mit einem "Step"
            const step = 3; 
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    const index = (y * canvas.width + x) * 4;
                    // Wenn der Pixel weiß ist (Teil der Schrift)
                    if (data[index] > 128) {
                        // Zentriere die Koordinaten um 0,0
                        const pX = (x - canvas.width / 2) * 0.4;
                        const pY = -(y - canvas.height / 2) * 0.4; 
                        coordinates.push({ x: pX, y: pY });
                    }
                }
            }
            return coordinates;
        }

        const targetCoords = getTextCoordinates();
        const particleCount = targetCoords.length;

        /**
         * 3. THREE.JS SETUP & SHADER INJECTION
         */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 180; // Weit genug weg, um alles zu sehen

        const canvasWebGL = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvasWebGL, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // Additives Blending für den Premium Glow-Look
        renderer.setClearColor(0x030304, 1);

        // Geometrie & Attribute
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);     // Ziel-Positionen (Das Wort)
        const randomPositions = new Float32Array(particleCount * 3); // Start-Positionen (Chaos)
        const sizes = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            // Ziel (Das Wort)
            positions[i * 3] = targetCoords[i].x;
            positions[i * 3 + 1] = targetCoords[i].y;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 4; // Ganz leichte Tiefe in der Schrift

            // Start (Absolutes Chaos im dreidimensionalen Raum)
            randomPositions[i * 3] = (Math.random() - 0.5) * 600;
            randomPositions[i * 3 + 1] = (Math.random() - 0.5) * 600;
            randomPositions[i * 3 + 2] = (Math.random() - 0.5) * 600;

            sizes[i] = Math.random() * 2.0 + 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('a_randomPos', new THREE.BufferAttribute(randomPositions, 3));
        geometry.setAttribute('a_size', new THREE.BufferAttribute(sizes, 1));

        // Shader Material
        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            blending: THREE.AdditiveBlending, // Das macht die Partikel leuchtend, wenn sie überlappen
            depthWrite: false, // Verhindert schwarze Ränder bei überlappenden Transparenzen
            uniforms: {
                u_progress: { value: 0.0 },
                u_time: { value: 0.0 }
            }
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        /**
         * 4. ANIMATION CONTROL (GSAP + Scroll)
         */
        
        // Verstecke die Scroll-Instruktion schnell
        gsap.to("#scroll-hint", {
            opacity: 0,
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "2% top",
                end: "5% top",
                scrub: true
            }
        });

        // Koppel das Zusammenfliegen der Partikel an den Scroll
        gsap.to(material.uniforms.u_progress, {
            value: 1.0,
            ease: "none",
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.2, // Cinematic delay
            }
        });

        // Leichtes Kamera-Push-in, wenn sich das Wort formt
        gsap.to(camera.position, {
            z: 120,
            ease: "none",
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.2,
            }
        });

        // Das finale UI einblenden, sobald das Wort komplett steht
        gsap.to("#final-ui", {
            opacity: 1,
            y: 0,
            ease: "power2.out",
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "80% top", // Startet spät
                end: "95% top",
                scrub: true
            }
        });

        /**
         * 5. RENDER LOOP
         */
        const clock = new THREE.Clock();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.u_time.value = clock.getElapsedTime();
            
            // Leichte, ständige Rotation des gesamten Systems für Lebendigkeit
            particleSystem.rotation.y = Math.sin(clock.getElapsedTime() * 0.1) * 0.1;
            particleSystem.rotation.x = Math.cos(clock.getElapsedTime() * 0.1) * 0.05;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
