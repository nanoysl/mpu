<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU Beratung | Aus Chaos wird Struktur</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* === COLOR PALETTE & RESET === */
        :root {
            --alabaster: #EBEBE8; /* Sehr warmes, weiches Off-White */
            --charcoal: #0F0F0F;  /* Fast Schwarz, aber weicher */
            --text-muted: rgba(15, 15, 15, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            background-color: var(--alabaster);
            color: var(--charcoal);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            /* Verstecke nativen Scrollbar für Cinematic Look */
            scrollbar-width: none;
            cursor: default;
        }
        ::-webkit-scrollbar { display: none; }

        /* === TEXTURE LAYER (Das 200k Büttenpapier) === */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.4;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.3'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        /* === 3D CANVAS === */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none; /* Klicks gehen durch auf UI */
        }

        /* === SCROLL TRACK === */
        .scroll-track {
            height: 400vh; /* Der physische Raum, den der Nutzer zum Entwirren braucht */
            position: relative;
            z-index: 10;
        }

        /* === UI LAYER === */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .content-container {
            text-align: center;
            max-width: 800px;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: translateY(10vh); /* Startet leicht unten */
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 3rem;
            opacity: 0; /* GSAP animiert das */
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 7vw, 6.5rem);
            line-height: 1.05;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: var(--charcoal);
        }

        .headline span {
            display: block;
            opacity: 0;
            transform: translateY(40px);
            filter: blur(10px);
        }

        .headline i {
            font-style: italic;
            color: var(--text-muted);
        }

        .subtext {
            font-size: clamp(1rem, 1.2vw, 1.25rem);
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 500px;
            font-weight: 300;
            opacity: 0;
        }

        /* Call to Action */
        .cta-wrapper {
            margin-top: 4rem;
            opacity: 0;
            pointer-events: auto;
        }

        .btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            border: 1px solid var(--charcoal);
            border-radius: 100px;
            color: var(--charcoal);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
        }

        .btn:hover {
            background: var(--charcoal);
            color: var(--alabaster);
            transform: scale(1.05);
        }

        /* Scroll Indikator - extrem dezent */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 60px;
            background: rgba(15, 15, 15, 0.2);
            z-index: 20;
            overflow: hidden;
        }

        .scroll-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: var(--charcoal);
            animation: scrolldown 2s infinite ease-in-out;
        }

        @keyframes scrolldown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div id="webgl-container"></div>

    <div class="ui-layer">
        <div class="content-container">
            <div class="label" id="anim-label">MPU Beratung & Strategie</div>
            <h1 class="headline">
                <span id="anim-h1">Aus Chaos</span>
                <span id="anim-h2"><i>wird</i> Struktur.</span>
            </h1>
            <p class="subtext" id="anim-sub">
                Ihre MPU-Vorbereitung. Keine falschen Versprechen, sondern eine präzise, ehrliche Aufarbeitung Ihrer Geschichte. Wir ordnen den Weg zurück zum Führerschein.
            </p>
            <div class="cta-wrapper" id="anim-cta">
                <a href="#" class="btn">Erstgespräch vereinbaren</a>
            </div>
        </div>
    </div>

    <div class="scroll-indicator" id="scroll-ind"></div>
    <div class="scroll-track"></div>

    <script>
        /**
         * 1. LENIS SMOOTH SCROLLING 
         * Absoluter Agentur-Standard für cineastisches Scrollen
         */
        const lenis = new Lenis({
            duration: 1.5, // Extrem smooth
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            gestureDirection: 'vertical',
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // GSAP Synchronisation
        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0, 0);

        /**
         * 2. THREE.JS HIGH-END SETUP (Der Knoten)
         */
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        
        // Kamera Setup
        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60; // Weit weg für flache Perspektive

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Perf für Retina
        container.appendChild(renderer.domElement);

        // Licht Setup (Cinematic Studio Lighting)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xddddff, 1);
        fillLight.position.set(-10, 0, -10);
        scene.add(fillLight);

        /**
         * 3. DIE MATHEMATIK DES KNOTENS UND DER LINIE
         * Wir erstellen zwei exakt gleich große Kurven und "morphen" dazwischen.
         */
        const segments = 400; // Hohe Auflösung für weiche Kurven
        const knotPoints = [];
        const linePoints = [];

        for (let i = 0; i <= segments; i++) {
            // t geht von 0 bis 2PI, multipliziert für mehr "Schlaufen"
            let t = (i / segments) * Math.PI * 2 * 3; 

            // STATE A: Torus Knoten (Chaos)
            let p = 2, q = 3;
            let R = 8, r = 4;
            let kx = (R + r * Math.cos(q * t)) * Math.cos(p * t);
            let ky = (R + r * Math.cos(q * t)) * Math.sin(p * t);
            let kz = r * Math.sin(q * t);
            knotPoints.push(new THREE.Vector3(kx, ky, kz));

            // STATE B: Die entwirrte Linie (Struktur)
            // Eine extrem weiche, majestätische S-Kurve, die über den Bildschirm wandert
            let progress = i / segments;
            let lx = Math.sin(progress * Math.PI * 2) * 8; // Leichter Schwung links/rechts
            let ly = (progress - 0.5) * -70; // Geht von oben nach unten
            let lz = Math.cos(progress * Math.PI) * 2;
            linePoints.push(new THREE.Vector3(lx, ly, lz));
        }

        const knotCurve = new THREE.CatmullRomCurve3(knotPoints);
        const lineCurve = new THREE.CatmullRomCurve3(linePoints);

        // Erstelle Basis-Geometrie aus dem Knoten
        const tubeGeometry = new THREE.TubeGeometry(knotCurve, 300, 0.4, 32, false);
        
        // Erstelle Ziel-Geometrie (Linie) nur für die Vertices
        const targetGeometry = new THREE.TubeGeometry(lineCurve, 300, 0.4, 32, false);

        // SETUP MORPH TARGET (Die Magie, die den Knoten entwirrt)
        tubeGeometry.morphAttributes.position = [];
        tubeGeometry.morphAttributes.position[0] = new THREE.Float32BufferAttribute(targetGeometry.attributes.position.array, 3);
        
        // Optional: Normals morphen für perfekte Lichtbrechung (Macht es teuer, aber 200k Look)
        tubeGeometry.morphAttributes.normal = [];
        tubeGeometry.morphAttributes.normal[0] = new THREE.Float32BufferAttribute(targetGeometry.attributes.normal.array, 3);

        // Material: Fotorealistische tiefdunkle Seide/Carbon
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x0f0f0f,
            roughness: 0.2,
            metalness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            // morphTargets sind im aktuellen Three.js by default an, wenn Attribute existieren
        });

        const threadMesh = new THREE.Mesh(tubeGeometry, material);
        scene.add(threadMesh);

        /**
         * 4. ANIMATION & SCROLL LOGIC
         */
        
        // Kontinuierliche langsame Rotation im Ruhezustand
        let baseRotation = 0;
        
        const renderLoop = () => {
            baseRotation += 0.002;
            
            // Wenn der Knoten noch nicht komplett entwirrt ist, rotiere ihn leicht
            if (threadMesh.morphTargetInfluences[0] < 0.9) {
                threadMesh.rotation.y = baseRotation;
                threadMesh.rotation.x = Math.sin(baseRotation) * 0.2;
            } else {
                // Beruhige die Rotation, wenn er gerade ist
                threadMesh.rotation.y = gsap.utils.interpolate(threadMesh.rotation.y, 0, 0.05);
                threadMesh.rotation.x = gsap.utils.interpolate(threadMesh.rotation.x, 0, 0.05);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        };
        renderLoop();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        /**
         * 5. SCROLL TRIGGER TIMELINE (Die Story)
         */
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5, // Butterweiche 1.5 Sekunden Verzögerung nach dem Scrollen
            }
        });

        // Verstecke den Scroll-Indikator sofort beim ersten Scrollen
        tl.to("#scroll-ind", { opacity: 0, duration: 0.1 }, 0);

        // 1. Entwirre den Knoten (Morph Influence von 0 auf 1)
        tl.to(threadMesh.morphTargetInfluences, {
            [0]: 1,
            ease: "power2.inOut"
        }, 0);

        // 2. Kamera-Fahrt: Gehe leicht nach unten, um der Linie zu folgen
        tl.to(camera.position, {
            y: -15,
            z: 50,
            ease: "power1.inOut"
        }, 0);

        // 3. Typografie Cinematic Reveal
        // Startet, wenn der Knoten zu ca. 60% gelöst ist
        tl.to("#anim-label", { opacity: 1, y: 0, duration: 0.5 }, 0.5);
        
        tl.to("#anim-h1", { 
            opacity: 1, 
            y: 0, 
            filter: "blur(0px)", 
            duration: 0.8, 
            ease: "expo.out" 
        }, 0.55);

        tl.to("#anim-h2", { 
            opacity: 1, 
            y: 0, 
            filter: "blur(0px)", 
            duration: 0.8, 
            ease: "expo.out" 
        }, 0.65);

        tl.to("#anim-sub", { 
            opacity: 1, 
            y: 0, 
            duration: 0.8, 
            ease: "power2.out" 
        }, 0.7);

        tl.to("#anim-cta", { 
            opacity: 1, 
            y: 0, 
            duration: 0.8, 
            ease: "power2.out" 
        }, 0.8);

    </script>
</body>
</html>
