<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU | Radikale Ehrlichkeit</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #030303; /* Absolute Darkness */
            --text-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar { display: none; }

        /* Das 3D Canvas (Fixiert im Hintergrund) */
        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Die Scroll-Distanz für die Kamerafahrt */
        .scroll-track {
            position: relative;
            height: 400vh;
            z-index: 2;
        }

        /* Das UI, das am Ende der Kamerafahrt auftaucht */
        .ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh; /* Sitzt im letzten Viewport der Scroll-Track */
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 4vw;
            z-index: 10;
            pointer-events: none;
        }

        .ui-content {
            max-width: 500px;
            opacity: 0; /* Wird von GSAP eingeblendet */
            transform: translateY(30px);
        }

        .ui-subhead {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 1rem;
        }

        .ui-text {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3rem;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease;
            pointer-events: auto; /* Klickbar machen */
        }

        .cta-btn:hover {
            transform: scale(1.05);
            background-color: #cccccc;
        }

        /* Instruktion am Start */
        .scroll-instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(255, 255, 255, 0.3);
            z-index: 20;
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div class="scroll-instruction" id="instruction">Scroll to reveal truth</div>

    <div class="scroll-track">
        <div class="ui-layer">
            <div class="ui-content" id="final-ui">
                <div class="ui-subhead">MPU Strategie & Beratung</div>
                <p class="ui-text">
                    Wir arbeiten nicht mit Tricks. Wir arbeiten mit Struktur. Eine erfolgreiche MPU erfordert ehrliche Aufarbeitung und eine wissenschaftlich fundierte Vorbereitung. Wir machen es machbar.
                </p>
                <a href="#" class="cta-btn">Termin vereinbaren</a>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. LENIS SMOOTH SCROLL (Die physikalische Schwere der Kamera)
         */
        const lenis = new Lenis({
            duration: 2.0, // Extrem langsam und schwer für den Monolithen-Effekt
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        gsap.registerPlugin(ScrollTrigger);
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000) });
        gsap.ticker.lagSmoothing(0, 0);

        /**
         * 2. GENERIERE DIE 4K TEXTUR ON THE FLY
         * Wir zeichnen den Text auf ein Canvas, das als Roughness/Bump-Map für das Metall dient.
         */
        function createMonolithTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 4096;
            canvas.height = 4096;
            const ctx = canvas.getContext('2d');

            // Hintergrund: Sehr helles Grau (In der Roughness-Map bedeutet Weiß = extrem rau/matt)
            ctx.fillStyle = '#e0e0e0'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Text: Absolutes Schwarz (In der Roughness-Map bedeutet Schwarz = Spiegelglatt/poliert)
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Brutalistische Typografie
            ctx.font = '900 320px Inter, sans-serif';
            
            // Textblöcke zeichnen
            ctx.fillText('WIR VERSPRECHEN', 2048, 1400);
            ctx.fillText('NICHT, DASS ES', 2048, 1800);
            ctx.fillText('LEICHT WIRD.', 2048, 2200);
            
            ctx.font = '500 160px Inter, sans-serif';
            ctx.fillText('WIR VERSPRECHEN, DASS ES MACHBAR IST.', 2048, 2800);

            // Füge extrem feines Rauschen (Brushed Metal Grain) über das ganze Canvas hinzu
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                // Nur Rauschen auf dem grauen "Stein", nicht im polierten Text
                if (data[i] > 50) { 
                    const noise = (Math.random() - 0.5) * 30;
                    data[i] += noise;     // R
                    data[i+1] += noise;   // G
                    data[i+2] += noise;   // B
                }
            }
            ctx.putImageData(imageData, 0, 0);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = 16; // Höchste Schärfe im Winkel
            return texture;
        }

        /**
         * 3. THREE.JS SCENE SETUP
         */
        const canvas = document.getElementById('webgl-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const scene = new THREE.Scene();
        // Fog für absolute Tiefe in den Ecken
        scene.fog = new THREE.FogExp2(0x030303, 0.02);

        // Kamera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        /**
         * 4. DER MONOLITH (Das 200k Element)
         */
        const monolithGeometry = new THREE.BoxGeometry(24, 24, 2);
        const monolithTexture = createMonolithTexture();

        const monolithMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x111111,          // Dunkles Titan/Obsidian
            metalness: 1.0,           // 100% Metall
            roughness: 0.8,           // Basis-Rauheit wird von der Map überschrieben
            roughnessMap: monolithTexture, // Der Text ist glatt (schwarz), der Rest rau (weiß)
            bumpMap: monolithTexture,      // Der Text ist physisch "eingraviert"
            bumpScale: 0.05,
            clearcoat: 0.1,
            clearcoatRoughness: 0.4,
        });

        const monolith = new THREE.Mesh(monolithGeometry, monolithMaterial);
        scene.add(monolith);

        /**
         * 5. HIGH-END BELEUCHTUNG (Cinematic Studio)
         */
        // Umgebungslicht (sehr schwach)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // Dramatisches Spotlight von oben (Key Light)
        const spotLight = new THREE.SpotLight(0xffffff, 500);
        spotLight.position.set(0, 20, 10);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.8;
        scene.add(spotLight);

        // Ein seitliches, kühles Kantenlicht (Rim Light) für das Metall
        const rimLight = new THREE.PointLight(0x88bbff, 200);
        rimLight.position.set(-15, 0, -5);
        scene.add(rimLight);

        // Interaktives Licht, das der Maus folgt (simuliert eine Taschenlampe/Reflektion)
        const mouseLight = new THREE.PointLight(0xffddaa, 100);
        mouseLight.position.set(0, 0, 5);
        scene.add(mouseLight);

        /**
         * 6. STARTPOSITIONEN (Makro-Aufnahme)
         */
        // Wir starten EXTREM nah am Monolithen, angewinkelt. Man sieht nur die Textur, keinen Text.
        camera.position.set(-8, -5, 4);
        monolith.rotation.x = -0.2;
        monolith.rotation.y = 0.5;

        /**
         * 7. GSAP SCROLL ANIMATION (Die Kamerafahrt)
         */
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scroll-track",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5, // Schwere, filmische Verzögerung
            }
        });

        // Die Instruktion ausblenden
        tl.to("#instruction", { opacity: 0, duration: 0.05 }, 0);

        // Die monumentale Kamerafahrt und Monolith-Rotation
        tl.to(camera.position, {
            x: 0,
            y: 0,
            z: 28, // Wir ziehen massiv auf, um das ganze Objekt zu sehen
            ease: "power2.inOut"
        }, 0);

        tl.to(monolith.rotation, {
            x: 0,
            y: 0, // Dreht sich frontal zum Nutzer
            z: 0,
            ease: "power2.inOut"
        }, 0);

        // Das finale UI einblenden, wenn die Kamera zum Stehen kommt
        tl.to("#final-ui", {
            opacity: 1,
            y: 0,
            duration: 0.2,
            ease: "power1.out"
        }, 0.8); // Startet bei 80% des Scrolls


        /**
         * 8. INTERAKTION & RENDER LOOP
         */
        let mouseX = 0;
        let mouseY = 0;

        window.addEventListener('mousemove', (e) => {
            // Normalisierte Mauskoordinaten (-1 bis +1)
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Das interaktive Licht folgt butterweich der Maus (LERP)
            mouseLight.position.x += (mouseX * 15 - mouseLight.position.x) * 0.05;
            mouseLight.position.y += (mouseY * 15 - mouseLight.position.y) * 0.05;

            // Ein minimales, ständiges "Atmen" des Monolithen, damit er nicht tot wirkt
            const time = clock.getElapsedTime();
            monolith.position.y = Math.sin(time * 0.5) * 0.2;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
