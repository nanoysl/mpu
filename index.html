<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU | The Subtractive Truth</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-light: #f5f5f3;
            --accent: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            cursor: crosshair;
            transition: background-color 2s ease;
        }

        /* Das UI Layer (Erscheint erst nach der Zerstörung) */
        .reveal-layer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            padding: 2rem;
            opacity: 0;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5.5rem);
            color: var(--bg-dark);
            line-height: 1.1;
            margin-bottom: 2rem;
        }

        .headline i {
            color: var(--accent);
        }

        .subtext {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            max-width: 600px;
            color: rgba(0,0,0,0.6);
            margin-bottom: 3rem;
        }

        .cta-btn {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background: var(--bg-dark);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.8rem;
            border-radius: 4px;
            pointer-events: auto;
            transition: transform 0.3s ease;
        }

        .cta-btn:hover {
            transform: scale(1.05);
        }

        /* Der Canvas für die Physik */
        #physics-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
        }

        .instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            z-index: 6;
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="instruction" id="instr">Zerstöre das System</div>

    <div id="physics-container"></div>

    <div class="reveal-layer" id="reveal">
        <h1 class="headline">Ihre Geschichte ist <br><i>mehr als eine Akte.</i></h1>
        <p class="subtext">
            Keine Verurteilung. Keine Standard-Antworten. Wir erarbeiten Ihre echte Geschichte, damit Sie dem Gutachter auf Augenhöhe begegnen können.
        </p>
        <a href="#" class="cta-btn">Kostenfreies Erstgespräch</a>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, MouseConstraint, Mouse, World } = Matter;

        // 1. ENGINE SETUP
        const engine = Engine.create();
        const world = engine.world;
        const container = document.getElementById('physics-container');

        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent',
                pixelRatio: window.devicePixelRatio
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 2. DAS BÜROKRATIE-CHAOS (Wörter generieren)
        const words = [
            "§ 13 FeV", "SPERRFRIST", "DELIKT", "PROMILLE", "SCREENING", "DURCHFALLQUOTE", 
            "FAHREIGNUNG", "GUTACHTEN", "VERSTOSS", "AKTENZEICHEN", "MPU-BÜROKRATIE",
            "BEHÖRDENSTRESS", "PUNKTE", "ENTZUG", "FEHLERQUELLE", "STEUERUNGSFÄHIGKEIT",
            "ANORDNUNG", "EIGNUNGSZWEIFEL", "TRINKMOTIVE", "VERHALTENSÄNDERUNG"
        ];

        const bodies = [];

        function createWordBlock() {
            for (let i = 0; i < 40; i++) {
                const word = words[Math.floor(Math.random() * words.length)];
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                
                // Wir zeichnen den Text auf ein verstecktes Canvas, um eine Textur für Matter.js zu erstellen
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.font = '900 40px Inter';
                const metrics = ctx.measureText(word);
                const width = metrics.width + 40;
                const height = 60;
                
                canvas.width = width;
                canvas.height = height;
                ctx.fillStyle = '#ffffff';
                ctx.font = '900 40px Inter';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(word, width / 2, height / 2);

                const body = Bodies.rectangle(x, y, width, height, {
                    restitution: 0.6,
                    friction: 0.1,
                    render: {
                        sprite: {
                            texture: canvas.toDataURL(),
                            xScale: 1,
                            yScale: 1
                        }
                    }
                });
                bodies.push(body);
            }
        }

        createWordBlock();

        // Grenzen (Boden, Wände)
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
        const leftWall = Bodies.rectangle(-50, window.innerHeight / 2, 100, window.innerHeight, { isStatic: true });
        const rightWall = Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, window.innerHeight, { isStatic: true });

        World.add(world, [...bodies, ground, leftWall, rightWall]);

        // 3. INTERAKTION (Die Abrissbirne)
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });

        World.add(world, mouseConstraint);

        // Tracke Zerstörung
        let destroyedCount = 0;
        let hasTriggered = false;

        Matter.Events.on(mouseConstraint, 'mousemove', function(event) {
            destroyedCount++;
            if (destroyedCount > 200 && !hasTriggered) {
                triggerReveal();
            }
        });

        // 4. DER REVEAL
        function triggerReveal() {
            hasTriggered = true;
            
            // UI weichmachen
            gsap.to("body", { backgroundColor: "#f5f5f3", duration: 2 });
            gsap.to("#instr", { opacity: 0, duration: 0.5 });
            
            // Die physischen Wörter verblassen lassen
            bodies.forEach(body => {
                gsap.to(body.render, { opacity: 0, duration: 2 });
            });

            // Das Finale einblenden
            gsap.to("#reveal", { 
                opacity: 1, 
                pointerEvents: "auto", 
                duration: 2, 
                delay: 0.5,
                ease: "power2.out" 
            });

            // Schwerkraft massiv erhöhen, damit alles nach unten wegsackt
            engine.gravity.y = 5;
        }

        // Resize
        window.addEventListener('resize', function() {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
