<!DOCTYPE html>
<html lang="de" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPU Vorbereitung | Premium Ersteinschätzung</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030407',       // Abyssal Black
                        silver: '#e2e8f0',     // Premium Text
                        obsidian: '#0f111a',   // Darker surface
                        accent: '#00f0ff',     // Cyan/Teal glow for clarity
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        body, html {
            background-color: #030407;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            cursor: none; /* Custom Cursor */
        }

        /* SVG Noise Filter */
        .noise-overlay {
            position: fixed; inset: 0; z-index: 50; pointer-events: none; opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* WebGL-like Liquid Aura strictly using CSS & SVG Filters */
        .liquid-aura {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0,240,255,0.15) 0%, rgba(0,100,255,0.05) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px) url(#displacementFilter);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* Typographic clipping for smooth reveals */
        .clip-wrap { overflow: hidden; display: inline-block; }
        .char-wrap { display: inline-block; will-change: transform, opacity; }

        /* Custom Cursor */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 20px; height: 20px;
            background: #fff; border-radius: 50%; pointer-events: none;
            mix-blend-mode: difference; z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            will-change: transform, width, height;
        }
        .custom-cursor.hovering { width: 80px; height: 80px; background: rgba(0, 240, 255, 0.8); }
        
        /* Outline Cursor Follower */
        .cursor-follower {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%;
            pointer-events: none; z-index: 9998;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* Hide default selection, make it look custom */
        ::selection { background: #00f0ff; color: #030407; }

        /* Loader */
        #initial-loader {
            position: fixed; inset: 0; background: #030407; z-index: 10000;
            display: flex; justify-content: center; items-center; color: #fff;
        }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .custom-cursor, .cursor-follower { display: none; }
        }
    </style>
</head>
<body>

    <svg style="width:0;height:0;position:absolute;" aria-hidden="true">
        <filter id="displacementFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" result="noise">
                <animate attributeName="baseFrequency" values="0.01; 0.015; 0.01" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="150" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="noise-overlay"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState, useLayoutEffect } = React;

        // --- UTILS ---
        
        // Custom Hook for Mouse Tracking
        const useMousePosition = () => {
            const [mousePosition, setMousePosition] = useState({ x: window.innerWidth/2, y: window.innerHeight/2 });
            useEffect(() => {
                const updateMousePosition = ev => {
                    setMousePosition({ x: ev.clientX, y: ev.clientY });
                };
                window.addEventListener('mousemove', updateMousePosition);
                return () => window.removeEventListener('mousemove', updateMousePosition);
            }, []);
            return mousePosition;
        };

        // --- COMPONENTS ---

        // 1. Interactive Custom Cursor
        const Cursor = () => {
            const cursorRef = useRef(null);
            const followerRef = useRef(null);
            const mousePosition = useMousePosition();
            const [isHovering, setIsHovering] = useState(false);

            useEffect(() => {
                const addHover = () => setIsHovering(true);
                const removeHover = () => setIsHovering(false);
                
                const hoverElements = document.querySelectorAll('a, button, .hover-trigger');
                hoverElements.forEach(el => {
                    el.addEventListener('mouseenter', addHover);
                    el.addEventListener('mouseleave', removeHover);
                });

                return () => {
                    hoverElements.forEach(el => {
                        el.removeEventListener('mouseenter', addHover);
                        el.removeEventListener('mouseleave', removeHover);
                    });
                };
            });

            useEffect(() => {
                // Main cursor instant follow
                gsap.to(cursorRef.current, {
                    x: mousePosition.x, y: mousePosition.y, duration: 0, ease: "none"
                });
                // Follower delayed
                gsap.to(followerRef.current, {
                    x: mousePosition.x, y: mousePosition.y, duration: 0.6, ease: "power3.out"
                });
            }, [mousePosition]);

            return (
                <>
                    <div ref={cursorRef} className={`custom-cursor ${isHovering ? 'hovering' : ''}`} />
                    <div ref={followerRef} className="cursor-follower" />
                </>
            );
        };

        // 2. Custom Split Text Component (Da GSAP SplitText Premium ist)
        const SplitText = ({ text, className }) => {
            return (
                <span className={className} aria-label={text}>
                    {text.split(' ').map((word, wordIndex) => (
                        <span key={wordIndex} className="clip-wrap mr-[0.3em]">
                            {word.split('').map((char, charIndex) => (
                                <span key={charIndex} className="char-wrap" dangerouslySetInnerHTML={{ __html: char === ' ' ? '&nbsp;' : char }} />
                            ))}
                        </span>
                    ))}
                </span>
            );
        };

        // 3. The Interactive Blueprint Accordion (Fahrplan)
        const BlueprintFahrplan = () => {
            const [activeIndex, setActiveIndex] = useState(null);
            const containerRef = useRef(null);

            const steps = [
                { num: "01", title: "Akte & Fall", desc: "Tiefenanalyse der Behördenakte. Wir entschlüsseln die exakten Vorwürfe und Fristen." },
                { num: "02", title: "Nachweise", desc: "Strategische Klärung: Sind Abstinenznachweise zwingend? Wir verhindern verlorene Monate." },
                { num: "03", title: "Aufarbeitung", desc: "Kein Auswendiglernen. Echte, psychologisch fundierte Reflexion Ihres Falls in Einzelgesprächen." },
                { num: "04", title: "Simulation", desc: "Wir simulieren das Gutachtergespräch unter Realbedingungen, bis die Unsicherheit verschwindet." }
            ];

            const handleEnter = (index) => {
                setActiveIndex(index);
                gsap.to(`.step-content-${index}`, { height: 'auto', opacity: 1, duration: 0.6, ease: "expo.out" });
                gsap.to(`.step-num-${index}`, { x: 20, color: '#00f0ff', duration: 0.4 });
            };

            const handleLeave = (index) => {
                setActiveIndex(null);
                gsap.to(`.step-content-${index}`, { height: 0, opacity: 0, duration: 0.4, ease: "power2.inOut" });
                gsap.to(`.step-num-${index}`, { x: 0, color: 'rgba(226, 232, 240, 0.2)', duration: 0.4 });
            };

            return (
                <div className="flex flex-col gap-0 border-t border-white/10 w-full lg:max-w-md mt-16 lg:mt-0 relative z-20" ref={containerRef}>
                    <div className="text-[10px] uppercase tracking-[0.2em] text-accent mb-6 font-bold">Protokoll / Fahrplan</div>
                    
                    {steps.map((step, i) => (
                        <div 
                            key={i} 
                            className="group relative border-b border-white/10 py-6 cursor-none hover-trigger"
                            onMouseEnter={() => handleEnter(i)}
                            onMouseLeave={() => handleLeave(i)}
                        >
                            <div className="flex items-center gap-8 pointer-events-none">
                                <span className={`step-num-${i} text-5xl font-display font-bold text-white/20 transition-colors duration-500`}>
                                    {step.num}
                                </span>
                                <h3 className="text-xl font-medium tracking-wide text-silver">{step.title}</h3>
                            </div>
                            
                            <div className={`step-content-${i} h-0 overflow-hidden opacity-0 pl-[5.5rem] pr-4`}>
                                <div className="pt-4 pb-2 text-sm text-silver/60 leading-relaxed font-light">
                                    {step.desc}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // 4. Main Hero Scene
        const App = () => {
            const heroRef = useRef(null);
            const mousePos = useMousePosition();
            const auraRef = useRef(null);

            // Aura Parallax Logic
            useEffect(() => {
                if (window.innerWidth > 768 && auraRef.current) {
                    const x = (mousePos.x - window.innerWidth / 2) * 0.1;
                    const y = (mousePos.y - window.innerHeight / 2) * 0.1;
                    gsap.to(auraRef.current, {
                        x: x - window.innerWidth * 0.3, // offset for center
                        y: y - window.innerHeight * 0.3,
                        duration: 2,
                        ease: "power2.out"
                    });
                }
            }, [mousePos]);

            // Master Entry Animation
            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    const tl = gsap.timeline();

                    // Initial States
                    gsap.set(".char-wrap", { y: "120%", rotateX: -90, opacity: 0 });
                    gsap.set(".fade-up", { y: 40, opacity: 0 });
                    gsap.set(".trust-line", { scaleX: 0, transformOrigin: "left" });

                    // 1. Aura Swells up
                    tl.fromTo(auraRef.current, 
                        { scale: 0, opacity: 0 },
                        { scale: 1, opacity: 1, duration: 3, ease: "expo.out" },
                        0
                    );

                    // 2. Cinematic Typography Reveal
                    tl.to(".char-wrap", {
                        y: "0%",
                        rotateX: 0,
                        opacity: 1,
                        duration: 1.5,
                        stagger: 0.02,
                        ease: "expo.out"
                    }, 0.5);

                    // 3. Subtext & Trust Elements
                    tl.to(".fade-up", {
                        y: 0,
                        opacity: 1,
                        duration: 1.2,
                        stagger: 0.1,
                        ease: "power3.out"
                    }, 1.2);

                    tl.to(".trust-line", {
                        scaleX: 1,
                        duration: 1.5,
                        ease: "expo.inOut"
                    }, 1.2);

                }, heroRef);

                return () => ctx.revert();
            }, []);

            return (
                <div ref={heroRef} className="relative min-h-[100dvh] w-full flex flex-col justify-between pt-8 lg:pt-12 pb-24 px-6 lg:px-12 selection:bg-accent selection:text-void">
                    
                    <Cursor />

                    {/* The WebGL-Simulated Aura */}
                    <div ref={auraRef} className="liquid-aura top-1/2 left-1/2 hidden md:block"></div>

                    {/* Header Top */}
                    <header className="relative z-20 flex justify-between items-center fade-up w-full max-w-7xl mx-auto">
                        <div className="flex flex-col">
                            <span className="font-display font-bold tracking-widest text-lg uppercase flex items-center gap-3">
                                <span className="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
                                MPU Kompetenz
                            </span>
                            <span className="text-[10px] text-silver/50 uppercase tracking-[0.3em] mt-1 ml-5">
                                [Stadt] & Secure Online
                            </span>
                        </div>
                        <a href="#kontakt" className="hover-trigger relative overflow-hidden group px-6 py-3 border border-white/20 rounded-full text-xs font-medium tracking-widest uppercase transition-all duration-500 hover:border-accent hover:text-accent">
                            <span className="relative z-10">Diskret Kontaktieren</span>
                            <div className="absolute inset-0 bg-accent/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-in-out"></div>
                        </a>
                    </header>

                    {/* Main Stage */}
                    <main className="relative z-20 flex-grow flex flex-col lg:flex-row items-center justify-between gap-12 max-w-7xl mx-auto w-full mt-16 lg:mt-0">
                        
                        {/* Left: Colossal Typography & Action */}
                        <div className="w-full lg:w-[60%] flex flex-col">
                            
                            <div className="mb-6 fade-up">
                                <div className="inline-flex items-center gap-3 px-4 py-2 border border-white/10 bg-white/[0.02] backdrop-blur-md rounded-full">
                                    <svg className="w-4 h-4 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                    <span className="text-xs tracking-[0.1em] text-silver/80 uppercase font-medium">100% Diskrete Ersteinschätzung</span>
                                </div>
                            </div>

                            <h1 className="text-[4rem] sm:text-[6rem] lg:text-[7.5rem] leading-[0.85] font-display font-bold uppercase tracking-tight text-white mb-8 perspective-1000">
                                <SplitText text="ZURÜCK" className="block" />
                                <span className="block text-transparent bg-clip-text bg-gradient-to-r from-accent via-white to-silver italic font-medium">
                                    <SplitText text="IN DIE SPUR" className="" />
                                </span>
                            </h1>

                            <div className="pl-0 lg:pl-2 border-l border-transparent lg:border-accent/30 fade-up">
                                <p className="text-lg lg:text-xl font-light text-silver/70 max-w-lg leading-relaxed mb-10">
                                    Wir ordnen das Chaos. Strukturierte Vorbereitung bei Alkohol, Drogen, Cannabis oder Punkten in [Stadt]. <br/>
                                    <strong className="font-semibold text-silver">Keine falschen Versprechen. Nur klare Fakten und ein sicherer Plan.</strong>
                                </p>

                                {/* Action Area */}
                                <div className="flex flex-col sm:flex-row gap-6 items-start sm:items-center">
                                    <button className="hover-trigger group relative w-full sm:w-auto px-8 py-5 bg-white text-void rounded-none font-display font-bold uppercase tracking-widest text-sm overflow-hidden flex items-center justify-center gap-4">
                                        <div className="absolute inset-0 bg-accent translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500 ease-in-out"></div>
                                        <span className="relative z-10">Kostenlose Fallanalyse</span>
                                        <svg className="relative z-10 w-5 h-5 group-hover:translate-x-2 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                                    </button>

                                    <div className="flex flex-col gap-1">
                                        <span className="text-xs uppercase tracking-widest text-silver/40">Direktkontakt</span>
                                        <a href="tel:0123456" className="hover-trigger text-silver font-medium hover:text-accent transition-colors">0123 / 456 789 0</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right: The Interactive Blueprint */}
                        <div className="w-full lg:w-[40%] flex justify-end">
                            <BlueprintFahrplan />
                        </div>

                    </main>

                    {/* Bottom Trust Line & Disclaimer */}
                    <div className="relative z-20 w-full max-w-7xl mx-auto mt-20 pt-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 opacity-50">
                        <div className="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-accent/50 to-transparent trust-line"></div>
                        <p className="text-[10px] uppercase tracking-widest font-light">
                            Seriöse Aufarbeitung & Einzelgespräche anstatt Auswendiglernen.
                        </p>
                        <p className="text-[10px] uppercase tracking-widest font-light">
                            Hinweis: Keine unseriöse Bestehensgarantie.
                        </p>
                    </div>

                    {/* Mobile Sticky CTA */}
                    <div className="fixed bottom-0 left-0 w-full p-4 bg-void/90 backdrop-blur-xl border-t border-white/10 z-50 lg:hidden fade-up">
                        <button className="w-full bg-accent text-void py-4 text-sm font-bold uppercase tracking-widest">
                            Fallanalyse anfragen
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
