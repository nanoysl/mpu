<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU Vorbereitung | Klarheit statt Chaos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        /* === CSS VARIABLES & RESET === */
        :root {
            --col-bg: #090a0f;
            --col-text: #f0f0f2;
            --col-accent: #c4a77d; /* Ein beruhigendes, gedämpftes Gold/Bronze */
            --col-glass: rgba(9, 10, 15, 0.4);
            
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Manrope', sans-serif;
            
            --cursor-x: 50vw;
            --cursor-y: 50vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Wir nutzen einen Custom Cursor */
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--col-bg);
            color: var(--col-text);
            font-family: var(--font-sans);
            overflow: hidden; /* Nur Hero Section */
        }

        /* === BACKGROUND & NOISE (Die "Wahrheit" im Hintergrund) === */
        .bg-sharp {
            position: absolute;
            inset: 0;
            z-index: 1;
            /* Ein extrem hochwertiger, ruhiger Gradient, der einen Raum simuliert */
            background: radial-gradient(circle at 50% 30%, #1a1d2b 0%, #090a0f 70%);
        }

        /* Hochwertiges Film-Grain/Rauschen für Premium-Look */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* === THE CLARITY SHADER (Die Milchglas-Schicht) === */
        .glass-layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            background: var(--col-glass);
            backdrop-filter: blur(40px) brightness(0.8);
            -webkit-backdrop-filter: blur(40px) brightness(0.8);
            
            /* Der Magic Trick: Eine Maske, die an der Mausposition transparent ist */
            -webkit-mask-image: radial-gradient(circle 350px at var(--cursor-x) var(--cursor-y), transparent 0%, black 100%);
            mask-image: radial-gradient(circle 350px at var(--cursor-x) var(--cursor-y), transparent 0%, black 100%);
            pointer-events: none;
            transition: opacity 2s ease;
        }

        /* === CONTENT LAYOUT === */
        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 0 2rem;
            pointer-events: none; /* Damit Maus-Events auf den Button durchgehen */
        }

        /* Animations-Klassen für den Load-State */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(10px);
            animation: revealAnim 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .reveal:nth-child(1) { animation-delay: 0.2s; }
        .reveal:nth-child(2) { animation-delay: 0.4s; }
        .reveal:nth-child(3) { animation-delay: 0.6s; }
        .reveal:nth-child(4) { animation-delay: 0.8s; pointer-events: auto; }

        @keyframes revealAnim {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* === TYPOGRAPHY === */
        .subhead {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--col-accent);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .headline {
            font-family: var(--font-serif);
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
        }

        .headline i {
            font-style: italic;
            color: rgba(255, 255, 255, 0.6);
        }

        .paragraph {
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            line-height: 1.6;
            max-width: 600px;
            color: rgba(240, 240, 242, 0.7);
            margin-bottom: 4rem;
            font-weight: 300;
        }

        /* === MAGNETIC BUTTON === */
        .magnetic-wrap {
            display: inline-block;
            padding: 2rem; /* Hover-Area vergrößern */
            margin: -2rem;
            pointer-events: auto;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--col-text);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            overflow: hidden;
            background: transparent;
            transition: border-color 0.4s ease, color 0.4s ease;
            will-change: transform;
        }

        .btn-text {
            position: relative;
            z-index: 2;
            transition: color 0.4s ease;
        }

        /* Liquid Hover Fill */
        .btn-fill {
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 120%;
            height: 200%;
            background: var(--col-text);
            border-radius: 50%;
            z-index: 1;
            transform: translateY(100%) scale(0.8);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn:hover {
            border-color: var(--col-text);
        }

        .btn:hover .btn-text {
            color: var(--col-bg); /* Text wird dunkel */
        }

        .btn:hover .btn-fill {
            transform: translateY(0) scale(1);
        }

        /* === CUSTOM CURSOR === */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 8px;
            height: 8px;
            background-color: var(--col-accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
        }

        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(196, 167, 125, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* Cursor Hover State */
        body.hovering .cursor-dot {
            width: 0;
            height: 0;
        }
        body.hovering .cursor-ring {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.05);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="bg-sharp"></div>
    <div class="noise"></div>
    <div class="glass-layer" id="glass"></div>

    <div class="hero-content">
        <div class="subhead reveal">Diskrete MPU Vorbereitung in Berlin</div>
        <h1 class="headline reveal">Klarheit <i>statt</i> Chaos.</h1>
        <p class="paragraph reveal">Ein realistischer Fahrplan für Ihre MPU. Ohne leere Versprechen, mit ehrlicher Aufarbeitung und persönlicher Begleitung auf Augenhöhe.</p>
        
        <div class="magnetic-wrap reveal" id="magnet-wrap">
            <a href="#" class="btn" id="magnet-btn">
                <span class="btn-text">Erstgespräch diskret anfragen</span>
                <div class="btn-fill"></div>
            </a>
        </div>
    </div>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <script>
        /**
         * LERP (Linear Interpolation) 
         * Sorgt für die extrem hochwertigen, butterweichen Verzögerungen (Spring Physics)
         */
        const lerp = (a, b, n) => (1 - n) * a + n * b;

        // Globale Maus-Koordinaten
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;

        // Koordinaten für den Shader (Glas-Maske)
        let glassX = window.innerWidth / 2;
        let glassY = window.innerHeight / 2;

        // Koordinaten für den Cursor Ring
        let ringX = window.innerWidth / 2;
        let ringY = window.innerHeight / 2;

        const glassLayer = document.getElementById('glass');
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');

        // Event Listener für Mausbewegung
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Der Dot folgt instant
            cursorDot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
        });

        // Main Render Loop (RequestAnimationFrame)
        const render = () => {
            // Lerp für die Glas-Maske (etwas träger für den Liquid/Nebel-Effekt)
            glassX = lerp(glassX, mouseX, 0.05);
            glassY = lerp(glassY, mouseY, 0.05);
            glassLayer.style.setProperty('--cursor-x', `${glassX}px`);
            glassLayer.style.setProperty('--cursor-y', `${glassY}px`);

            // Lerp für den Cursor Ring (schneller, smooth)
            ringX = lerp(ringX, mouseX, 0.15);
            ringY = lerp(ringY, mouseY, 0.15);
            cursorRing.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%)`;

            requestAnimationFrame(render);
        };
        render();

        /**
         * MAGNETIC BUTTON LOGIC
         * Berechnet die Distanz der Maus zur Mitte des Buttons und verschiebt ihn sanft.
         */
        const magnetWrap = document.getElementById('magnet-wrap');
        const magnetBtn = document.getElementById('magnet-btn');
        let magnetActive = false;

        magnetWrap.addEventListener('mousemove', (e) => {
            magnetActive = true;
            document.body.classList.add('hovering');

            const rect = magnetWrap.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Stärke des Magnet-Effekts
            const distanceX = (e.clientX - centerX) * 0.3;
            const distanceY = (e.clientY - centerY) * 0.3;

            magnetBtn.style.transform = `translate(${distanceX}px, ${distanceY}px)`;
        });

        magnetWrap.addEventListener('mouseleave', () => {
            magnetActive = false;
            document.body.classList.remove('hovering');
            // Reset Button to center
            magnetBtn.style.transform = `translate(0px, 0px)`;
        });

        // Mobile Fallback: Custom Cursor auf Touch-Geräten verstecken
        if (window.matchMedia("(pointer: coarse)").matches) {
            cursorDot.style.display = 'none';
            cursorRing.style.display = 'none';
            // Maske zentrieren
            glassLayer.style.setProperty('--cursor-x', `50vw`);
            glassLayer.style.setProperty('--cursor-y', `50vh`);
        }
    </script>
</body>
</html>
