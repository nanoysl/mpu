<!DOCTYPE html>
<html lang="de" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MPU Kompetenz | Project VOID</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Syne:wght@800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000',
                        stark: '#FFFFFF',
                        plasma: '#6600FF', // Ultraviolett
                        petrol: '#004D40', // Vertrauens-Akzent
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        display: ['Syne', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/PavelDoGreat/WebGL-Fluid-Simulation/fluid.js"></script>

    <style>
        body, html {
            background-color: #000000;
            color: #FFFFFF;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Cinematic Lock */
            -webkit-font-smoothing: antialiased;
            cursor: none; /* Wir bauen einen Custom Cursor */
        }

        #fluid-canvas {
            position: fixed; inset: 0; z-index: 1;
            width: 100%; height: 100%;
            pointer-events: none; /* Interaktion wird via JS weitergereicht */
        }

        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 10px; height: 10px;
            background: #fff; border-radius: 50%; pointer-events: none;
            z-index: 10000; transform: translate(-50%, -50%);
            mix-blend-mode: difference; transition: width 0.3s, height 0.3s;
        }
        .custom-cursor.active { width: 50px; height: 50px; background: rgba(102, 0, 255, 0.5); }

        /* Typografische Maske für WebGL-Text-Reveal */
        .text-mask {
            opacity: 0;
            transform: translateY(20px);
            will-change: transform, opacity;
        }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .custom-cursor { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="fluid-canvas"></canvas>
    <div id="root" class="relative z-10 w-full h-full"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState, useLayoutEffect } = React;

        // --- UTILS ---
        
        const useMousePosition = () => {
            const [mousePosition, setMousePosition] = useState({ x: window.innerWidth/2, y: window.innerHeight/2 });
            useEffect(() => {
                const updateMousePosition = ev => {
                    setMousePosition({ x: ev.clientX, y: ev.clientY });
                };
                window.addEventListener('mousemove', updateMousePosition);
                return () => window.removeEventListener('mousemove', updateMousePosition);
            }, []);
            return mousePosition;
        };

        // --- COMPONENTS ---

        // 1. Fluid Simulation Wrapper (Hält die WebGL-Instanz)
        const FluidSimulation = () => {
            useEffect(() => {
                const canvas = document.getElementById('fluid-canvas');
                
                // Konfiguration für die Simulation (Premium-Tuning)
                fluidSimulation({
                    canvas: canvas,
                    SIM_RESOLUTION: 128,  // Ausgewogen zwischen Qualität & Perf
                    DYE_RESOLUTION: 512,
                    DENSITY_DISSIPATION: 0.97, // Wie schnell verschwindet die Farbe
                    VELOCITY_DISSIPATION: 0.98,
                    PRESSURE: 0.8,
                    SPLAT_RADIUS: 0.25, // Größe des Maus-Eindrucks
                    SPLAT_FORCE: 6000,
                    SHADING: true,
                    COLORFUL: false, // Wir nutzen nur Weiß/Plasma
                    COLOR_PALETTE: ['#FFFFFF', '#6600FF'],
                    PAUSED: false,
                    BACK_COLOR: '#000000',
                    TRANSPARENT: true,
                });

                // Start Splat
                setTimeout(() => {
                    window.dispatchEvent(new CustomEvent('splat', { detail: { x: window.innerWidth/2, y: window.innerHeight/2, dx: 0, dy: 0, color: '#6600FF' } }));
                }, 500);

            }, []);

            return null; // Kein direktes Rendering, nur Canvas-Manipulation
        };

        // 2. Custom Magnetic Cursor
        const Cursor = () => {
            const cursorRef = useRef(null);
            const mousePosition = useMousePosition();
            const [active, setActive] = useState(false);

            useEffect(() => {
                const addActive = () => setActive(true);
                const removeActive = () => setActive(false);
                
                const interactiveElements = document.querySelectorAll('a, button, .interactive-trigger');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', addActive);
                    el.addEventListener('mouseleave', removeActive);
                });

                return () => {
                    interactiveElements.forEach(el => {
                        el.removeEventListener('mouseenter', addActive);
                        el.removeEventListener('mouseleave', removeActive);
                    });
                };
            });

            useEffect(() => {
                gsap.to(cursorRef.current, {
                    x: mousePosition.x, y: mousePosition.y, duration: 0.1, ease: "none"
                });
            }, [mousePosition]);

            return <div ref={cursorRef} className={`custom-cursor ${active ? 'active' : ''}`} />;
        };

        // 3. Main Void Scene
        const VoidHero = () => {
            const mainRef = useRef(null);
            const [showAuraInfo, setShowAuraInfo] = useState(false);

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    const tl = gsap.timeline();

                    // Initial States
                    gsap.set(".logo-reveal", { opacity: 0 });
                    gsap.set(".text-reveal", { opacity: 0, y: 30 });
                    gsap.set(".trigger-reveal", { opacity: 0, scale: 0.9 });
                    gsap.set(".disclaimer", { opacity: 0 });

                    // 1. Logo Fades in
                    tl.to(".logo-reveal", { opacity: 1, duration: 1.5, ease: "power2.inOut" }, 0.5);

                    // 2. Main Hyper-Typo Reveals
                    tl.to(".text-reveal", { opacity: 1, y: 0, duration: 2, stagger: 0.2, ease: "expo.out" }, 1.2);

                    // 3. The Trigger Zone appears
                    tl.to(".trigger-reveal", { opacity: 1, scale: 1, duration: 1.5, ease: "back.out(1.7)" }, 2);

                    // 4. Disclaimer
                    tl.to(".disclaimer", { opacity: 0.3, duration: 1 }, 3);

                }, mainRef);

                return () => ctx.revert();
            }, []);

            // Funktion, um beim Hover über die Info-Zonen Splats zu erzeugen
            const handleTriggerHover = (e, color = '#FFFFFF') => {
                window.dispatchEvent(new CustomEvent('splat', { detail: { x: e.clientX, y: e.clientY, dx: gsap.utils.random(-100, 100), dy: gsap.utils.random(-100, 100), color } }));
            };

            const fahrplanSteps = [
                { title: "ANALYSE", desc: "Akte sezieren. Vorwürfe entschlüsseln." },
                { title: "STRATEGIE", desc: "Fristen & Nachweise. Keine verlorene Zeit." },
                { title: "NEUSTART", desc: "Ehrliche Aufarbeitung. Fundierte Reflexion." },
                { title: "ZUKUNFT", desc: "Simuliertes Gutachten. Sicher bestehen." }
            ];

            return (
                <div ref={mainRef} className="relative w-full h-full flex flex-col justify-between p-6 lg:p-10">
                    <Cursor />
                    
                    {/* Header: Absolute Minimalism */}
                    <header className="relative z-20 flex justify-between items-center w-full max-w-[1920px] mx-auto">
                        <div className="logo-reveal font-display font-extrabold tracking-[-0.08em] text-[2.5rem] leading-none text-stark flex items-baseline">
                            VO<span className="text-plasma">ID</span>
                            <span className="font-sans text-[10px] uppercase tracking-widest ml-4 opacity-50">[Stadt]</span>
                        </div>
                        <a href="#kontakt" className="interactive-trigger group relative overflow-hidden px-8 py-4 border border-white/10 rounded-full text-xs font-sans tracking-widest uppercase text-stark hover:border-plasma transition-colors">
                            <span className="relative z-10 group-hover:text-plasma transition-colors">Diskretion Anfordern</span>
                            <div className="absolute inset-0 bg-plasma/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                        </a>
                    </header>

                    {/* Main Cinematic Core: Redefining Layout */}
                    <main className="relative z-10 flex-grow flex flex-col items-center justify-center text-center">
                        
                        <div className="w-full max-w-[1600px]">
                            
                            {/* Hyper Typography: Syne Extra Bold */}
                            <h1 className="font-display font-extrabold text-[12vw] sm:text-[10vw] lg:text-[8vw] leading-[0.82] tracking-[-0.1em] text-stark uppercase perspective-2000">
                                <div className="text-reveal inline-block w-full">ZURÜCK</div><br/>
                                <div className="text-reveal inline-block w-full text-plasma mix-blend-difference">IN DIE</div><br/>
                                <div className="text-reveal inline-block w-full italic transform translate-x-[5%] text-transparent bg-clip-text bg-gradient-to-r from-stark via-plasma to-stark">SPUR.</div>
                            </h1>

                            <div className="text-reveal font-sans text-xl lg:text-2xl font-light text-stark/80 max-w-3xl mx-auto mt-12 leading-relaxed">
                                Wir ordnen das Chaos. Strukturierte, persönliche MPU-Vorbereitung in [Stadt]. <br/>
                                <strong className="font-bold text-stark">Keine Versprechen. Nur die brutale Wahrheit & ein sicherer Plan.</strong>
                            </div>

                        </div>

                        {/* Interactive Trigger Zone: The "Aura Vessel" */}
                        <div className="trigger-reveal mt-20 relative w-full h-[40vh] flex items-center justify-center">
                            
                            {/* Invisibile Trigger Zone for Fluid Interaction */}
                            <div 
                                className="absolute w-[40vh] h-[40vh] rounded-full border border-white/5 bg-white/[0.01] interactive-trigger flex items-center justify-center transition-all duration-700 hover:border-plasma hover:bg-plasma/[0.03]"
                                onMouseMove={(e) => handleTriggerHover(e, '#6600FF')}
                                onClick={() => setShowAuraInfo(!showAuraInfo)}
                            >
                                <div className="text-center group">
                                    <div className="w-4 h-4 rounded-full bg-plasma mx-auto animate-pulse"></div>
                                    <span className="text-[10px] uppercase font-sans tracking-widest text-plasma/70 mt-4 block group-hover:text-plasma transition-colors">Interagieren / Entwirren</span>
                                </div>
                            </div>

                            {/* Type Reveal along the Fluid Aura (AURA-INFO) */}
                            {showAuraInfo && (
                                <div className="absolute inset-0 grid grid-cols-2 lg:grid-cols-4 gap-8 px-12 items-center pointer-events-none">
                                    {fahrplanSteps.map((step, i) => (
                                        <div key={i} className="text-mask font-sans flex flex-col text-left" style={{ opacity: 1, transform: 'translateY(0)', transition: `all 1s ease ${i*0.2}s` }}>
                                            <span className="text-[10px] uppercase tracking-widest text-plasma mb-2">Phase 0{i+1}</span>
                                            <h3 className="text-2xl font-bold text-stark mb-1">{step.title}</h3>
                                            <p className="text-sm text-stark/70 leading-relaxed font-light">{step.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            )}

                        </div>

                        {/* Direct Action Area */}
                        <div className="text-reveal mt-16 flex flex-col sm:flex-row gap-6 items-center">
                            <button className="interactive-trigger group relative px-12 py-6 bg-stark text-void rounded-none font-display font-extrabold uppercase tracking-widest text-sm overflow-hidden flex items-center gap-4 hover:bg-plasma transition-colors duration-500">
                                <span className="relative z-10 group-hover:text-stark transition-colors">Fallanalyse Anfordern</span>
                                <svg className="relative z-10 w-5 h-5 group-hover:translate-x-2 transition-transform duration-300 group-hover:text-stark transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                            </button>
                            <span className="text-sm font-sans tracking-wider text-stark/60 direct-contact">Oder direkt: <a href="tel:0123" className="text-stark interactive-trigger hover:text-plasmatransition-colors">0123 / 456</a></span>
                        </div>

                    </main>

                    {/* Footer: Disclaimer */}
                    <footer className="relative z-20 w-full max-w-[1920px] mx-auto mt-20 disclaimer pt-6 border-t border-white/5 flex flex-col sm:flex-row justify-between gap-4 items-center">
                        <p className="text-[10px] uppercase font-sans tracking-widest text-stark/50">Diskretion & Seriöse Vorbereitung statt falscher Versprechen.</p>
                        <p className="text-[10px] uppercase font-sans tracking-widest text-plasma animate-pulse">Keine Bestehensgarantie.</p>
                    </footer>

                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <>
                <FluidSimulation />
                <VoidHero />
            </>
        );
    </script>
</body>
</html>
