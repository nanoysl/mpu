<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPU Beratung | Ihr sicherer Hafen</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-warm: #fcf8f2;
            --text-muted: rgba(252, 248, 242, 0.7);
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom Interaction Focus */
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
        }

        /* WebGL Canvas */
        #glcanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Maus interagiert mit dem Glas dahinter */
            padding: 2rem;
            text-align: center;
        }

        .location-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--gold);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--text-warm);
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            
            /* Start-Zustand: Beschlagenes Glas */
            opacity: 0;
            filter: blur(15px);
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: filter 0.8s ease, text-shadow 0.8s ease;
        }

        .headline i {
            font-style: italic;
            color: rgba(255,255,255,0.6);
        }

        .subtext {
            font-size: clamp(1rem, 1.2vw, 1.25rem);
            max-width: 600px;
            color: var(--text-muted);
            line-height: 1.6;
            font-weight: 300;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease;
        }

        /* Call to Action */
        .cta-wrap {
            margin-top: 4rem;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: auto;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: var(--text-warm);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            border-radius: 2px;
            transition: all 0.4s ease;
        }

        .btn:hover {
            background: var(--text-warm);
            color: #050505;
        }

        /* Wenn das Glas fokussiert ist (Klasse wird per JS gesetzt) */
        body.focused .headline {
            filter: blur(0px);
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Custom Interaction Ring */
        .focus-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .focus-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        body.focused .focus-ring {
            transform: translate(-50%, -50%) scale(0.6);
            border-color: rgba(212, 175, 55, 0.5); /* Gold */
        }
    </style>
</head>
<body>

    <div id="glcanvas"></div>
    <div class="focus-ring" id="focus-ring"></div>

    <div class="ui-layer">
        <div class="location-badge" id="anim-badge">Diskret in Berlin & Digital</div>
        <h1 class="headline" id="anim-h1">Ihr sicherer <i>Hafen</i><br>im System.</h1>
        <p class="subtext" id="anim-sub">
            Die MPU fühlt sich oft an, als stünde man allein im Regen. Wir holen Sie da raus. Keine Verurteilung, keine leeren Versprechen. Nur eine präzise, ehrliche Vorbereitung auf Augenhöhe.
        </p>
        <div class="cta-wrap" id="anim-cta">
            <a href="#" class="btn">Kostenfreie Ersteinschätzung</a>
        </div>
    </div>

    <script type="x-shader/x-vertex" id="vertexShader">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = vec4(position, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentShader">
        uniform float u_time;
        uniform vec2 u_resolution;
        uniform vec2 u_mouse;
        uniform float u_focus; // 0.0 = Draußen scharf (Kalt), 1.0 = Drinnen scharf (Warm)
        
        uniform sampler2D texCity; // Kalte Stadt (Draußen)
        uniform sampler2D texRoom; // Warmer Raum (Spiegelung)

        varying vec2 vUv;

        // Hash & Noise für Kondenswasser und Regentropfen
        vec3 hash3( vec2 p ) {
            vec3 q = vec3( dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)), dot(p,vec2(419.2,371.9)) );
            return fract(sin(q)*43758.5453);
        }

        float noise( vec2 x ) {
            vec2 p = floor(x);
            vec2 f = fract(x);
            f = f*f*(3.0-2.0*f);
            float n = mix(
                mix( dot(hash3(p+vec2(0.0,0.0)).xy, f-vec2(0.0,0.0)), dot(hash3(p+vec2(1.0,0.0)).xy, f-vec2(1.0,0.0)), f.x),
                mix( dot(hash3(p+vec2(0.0,1.0)).xy, f-vec2(0.0,1.0)), dot(hash3(p+vec2(1.0,1.0)).xy, f-vec2(1.0,1.0)), f.x),
                f.y);
            return 0.5 + 0.5*n;
        }

        // Fast Gaussian Blur Simulation für die Unschärfe
        vec4 blurSample(sampler2D tex, vec2 uv, float radius) {
            vec4 color = vec4(0.0);
            float total = 0.0;
            vec2 offset = vec2(radius) / u_resolution;
            
            // 9-Tap Blur
            for(float x = -1.0; x <= 1.0; x++) {
                for(float y = -1.0; y <= 1.0; y++) {
                    color += texture2D(tex, uv + vec2(x, y) * offset);
                    total += 1.0;
                }
            }
            return color / total;
        }

        void main() {
            vec2 uv = vUv;
            
            // Fix Aspect Ratio für korrekte Tropfen
            vec2 st = uv;
            st.x *= u_resolution.x / u_resolution.y;

            // Kondenswasser / Glas-Textur generieren
            float frost = noise(st * 15.0);
            frost += noise(st * 40.0) * 0.5;
            
            // Verzerrung der UVs durch das Glas
            vec2 frostDistortion = vec2(noise(st * 10.0 + u_time * 0.1), noise(st * 10.0 - u_time * 0.1)) * 0.02;
            
            // Maus-Distanz für den interaktiven "Wipe/Focus" Effekt
            vec2 mouseUV = u_mouse / u_resolution;
            float mouseDist = distance(uv, mouseUV);
            
            // u_focus steuert den globalen Fokus, die Maus macht lokal "klar"
            float focusState = smoothstep(0.0, 1.0, u_focus);
            float localClear = 1.0 - smoothstep(0.0, 0.2, mouseDist);
            float finalFocus = clamp(focusState + localClear * 0.5, 0.0, 1.0);

            // STATE 1: Kalte Stadt draußen
            // Wenn fokussiert, wird die Stadt extrem unscharf (Bokeh Simulation)
            float cityBlurRadius = mix(2.0, 25.0, finalFocus); 
            vec2 cityUV = uv + frostDistortion * (1.0 - finalFocus); // Weniger Verzerrung wenn fokussiert
            vec4 colCity = blurSample(texCity, cityUV, cityBlurRadius);
            
            // Die Stadt etwas kälter/dunkler machen
            colCity.rgb *= vec3(0.7, 0.8, 1.0);

            // STATE 2: Warme Spiegelung des Innenraums
            // Wenn NICHT fokussiert, ist die Spiegelung unsichtbar/verschwommen
            float roomBlurRadius = mix(15.0, 1.0, finalFocus);
            vec4 colRoom = blurSample(texRoom, uv, roomBlurRadius);
            
            // Raumfarben extrem warm und hochwertig graden
            colRoom.rgb *= vec3(1.2, 0.9, 0.6) * 1.5;

            // MIXEN:
            // Wenn der Fokus auf der Scheibe liegt (finalFocus = 1.0),
            // dominiert die warme Spiegelung auf dem schwarzen Glas.
            vec3 finalColor = mix(colCity.rgb, colRoom.rgb * 0.8 + colCity.rgb * 0.2, finalFocus);

            // Vignette für den filmischen Look
            float vignette = uv.x * uv.y * (1.0 - uv.x) * (1.0 - uv.y);
            finalColor *= pow(vignette, 0.2) * 2.0;

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        /**
         * 1. THE CINETMATIC SETUP (Three.js)
         */
        const container = document.getElementById('glcanvas');
        const focusRing = document.getElementById('focus-ring');
        let width = window.innerWidth;
        let height = window.innerHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // High-End Texturen laden (CORS friendly Unsplash Source)
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin("anonymous");

        // Kalte Stadt im Regen
        const texCity = loader.load('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&w=2000&q=80');
        // Warme Luxus-Lounge (Spiegelung)
        const texRoom = loader.load('https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&w=2000&q=80');

        // Shader Uniforms
        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(width, height) },
            u_mouse: { value: new THREE.Vector2(width / 2, height / 2) },
            u_focus: { value: 0.0 }, // 0 = Stadt, 1 = Scheibe/Spiegelung
            texCity: { value: texCity },
            texRoom: { value: texRoom }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: uniforms
        });

        const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
        scene.add(plane);

        /**
         * 2. INTERACTION & FOCUS LOGIC
         */
        let mouseX = width / 2;
        let mouseY = height / 2;
        let targetFocus = 0.0;
        let isFocused = false;

        // Custom Cursor Tracker
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Ring folgen lassen
            focusRing.style.left = `${mouseX}px`;
            focusRing.style.top = `${mouseY}px`;
            
            // Für den WebGL Shader (Y invertieren)
            gsap.to(uniforms.u_mouse.value, {
                x: mouseX,
                y: height - mouseY,
                duration: 0.5,
                ease: "power2.out"
            });

            // Sobald die Maus bewegt wird, triggern wir den globalen Fokus
            if (!isFocused) {
                isFocused = true;
                targetFocus = 1.0;
                document.body.classList.add('focused');
            }
        });

        // Resize Handling
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            renderer.setSize(width, height);
            uniforms.u_resolution.value.set(width, height);
        });

        /**
         * 3. INITIAL REVEAL ANIMATION (GSAP)
         * Lässt den Text elegant einfliegen, während draußen der Regen wütet.
         */
        window.onload = () => {
            const tl = gsap.timeline({ delay: 0.5 });
            
            tl.to("#anim-badge", { opacity: 1, y: 0, duration: 1, ease: "power3.out" })
              .to("#anim-h1", { opacity: 1, duration: 1.5, ease: "power2.out" }, "-=0.5")
              .to("#anim-sub", { opacity: 1, y: 0, duration: 1.2, ease: "power2.out" }, "-=1.0")
              .to("#anim-cta", { opacity: 1, y: 0, duration: 1, ease: "power2.out" }, "-=0.8");
        };

        /**
         * 4. RENDER LOOP
         */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            uniforms.u_time.value += clock.getDelta();
            
            // LERP den Fokus für einen butterweichen Übergang (Kamera Fokus Pull)
            uniforms.u_focus.value += (targetFocus - uniforms.u_focus.value) * 0.03;

            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
